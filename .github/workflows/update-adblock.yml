# .github/workflows/update-blocklist.yml
name: Update SmartDNS Blocklist

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'generate_adblock.py'

permissions:
  contents: write

jobs:
  update-blocklist:
    runs-on: ubuntu-24.04  # Use latest Ubuntu
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # Temporary fix for Node 24
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Generate blocklist
        run: |
          python generate_adblock.py
          echo "=== File Statistics ==="
          echo "Total Rules: $(wc -l < adblock_merged.txt)"
          echo "File Size: $(du -h adblock_merged.txt | cut -f1)"
          echo "Wildcards: $(grep -c '^\*\.' adblock_merged.txt || echo 0)"
          echo "Domains: $(grep -cv '^\*\.' adblock_merged.txt || echo 0)"
          
      - name: Verify output
        run: |
          lines=$(wc -l < adblock_merged.txt)
          if [ "$lines" -lt 1000 ]; then
            echo "❌ ERROR: Too few domains ($lines). Check sources!"
            exit 1
          fi
          echo "✅ Valid output: $lines domains"
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add adblock_merged.txt
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "🔄 Update: $(date +%Y-%m-%d) - $(wc -l < adblock_merged.txt) rules"
            git push
          fi